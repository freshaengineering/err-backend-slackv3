name: slackv3-tests

on:
  push:
    branches: '**'
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'

jobs:
  test:
    runs-on: ubuntu-20.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          use-policy-store: true
          api-key: ${{ secrets.GH_FRESHAENGINEERING_STEP_SECURITY_API_KEY }}

      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
      - uses: actions/setup-python@e9aba2c848f5ebd159c070c61ea2c4e2b122355e # v2
        with:
          python-version: "3.9"
      - name: install deps
        run: |
          pip install errbot[slack] mock pytest pytest-pep8 coverage
          pip install -r requirements.txt
      - name: unittests
        run: |
          pytest
      - name: coverage
        run: |
          coverage run slackv3.py --pep8
          coverage report -m --fail-under 24
